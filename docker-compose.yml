version: '3.8'
services:
  # PHP 應用程式
  app:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
      - redis

  # MySQL 資料庫
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: your_db_name
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"

  # Redis 快取
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"